<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8/3 - Vườn Hồng Phép Thuật & Giai Điệu Yêu Thương</title>

<style>
    html, body {
        margin: 0; padding: 0; height: 100%;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        overflow: hidden;
        background: linear-gradient(135deg, #fce4ec, #ffc1e3, #ffd6f5);
        transition: background 1s;
    }

    /* TIÊU ĐỀ */
    .header {
        position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10;
    }
    h1 {
        font-size: 40px; color: white;
        text-shadow: 0 0 15px #ff4da6, 0 0 25px #ff80b3;
        margin: 0;
    }

    /* GAME CONTAINER */
    .game-container {
        height: 100vh; display: flex; flex-direction: column;
        justify-content: flex-start; align-items: center;
        padding-top: 90px; z-index: 15;
    }

    .status-bubble {
        background: white; padding: 12px 25px; border-radius: 30px;
        margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        font-weight: bold; color: #d81b60; border: 2px solid #ff80b3;
        min-width: 200px; text-align: center;
    }

    .quest-slots { display: flex; gap: 10px; margin-bottom: 25px; }
    .slot {
        width: 45px; height: 45px; background: white; border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        font-size: 22px; border: 2px solid #ff80b3; opacity: 0.4; transition: 0.4s;
    }
    .slot.done { opacity: 1; background: #ff4da6; border-color: white; transform: scale(1.2); box-shadow: 0 0 10px #ff4da6; }

    .shelf {
        display: flex; gap: 20px; background: rgba(255,255,255,0.6);
        padding: 15px 30px; border-radius: 50px; margin-bottom: 35px; border: 2px solid white;
    }
    .tool { font-size: 38px; cursor: grab; transition: 0.2s; user-select: none; }
    .tool:hover { transform: scale(1.3); }

    .pot-box {
        position: relative; width: 220px; height: 220px;
        display: flex; justify-content: center; align-items: flex-end;
    }
    .modern-pot {
        width: 130px; height: 95px; background: white;
        border-radius: 0 0 45px 45px; border: 5px solid #ffc1e3; z-index: 5;
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    #rose {
        position: absolute; bottom: 85px; font-size: 70px;
        transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2;
    }

    /* HIỆU ỨNG TIA NẮNG */
    .sunbeam {
        position: fixed; top: -100px; left: -100px;
        width: 80px; height: 150vh;
        background: linear-gradient(to bottom, rgba(255,235,59,0.4), transparent);
        transform: rotate(45deg); pointer-events: none; z-index: 1;
        animation: beamFade 2s forwards;
    }
    @keyframes beamFade { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

    /* HIỆU ỨNG MƯA */
    .rain-drop {
        position: fixed; background: #81d4fa; width: 2px; height: 20px;
        top: -20px; pointer-events: none; z-index: 20;
        animation: rainFall 0.7s linear forwards;
    }
    @keyframes rainFall { to { transform: translateY(110vh); } }

    #envelope {
        display: none; position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%); font-size: 130px;
        cursor: pointer; z-index: 100; animation: bounce 2s infinite;
    }
    @keyframes bounce { 0%, 100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-60%) scale(1.1); } }
</style>
</head>
<body id="mainBody">

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="header">
    <h1>💐 Chúc Mừng Ngày 8/3 💐</h1>
</div>

<div class="game-container">
    <div id="bubble" class="status-bubble">Gieo hạt giống 🌱 mẹ nhé!</div>
    
    <div class="quest-slots" id="questContainer">
        <div class="slot" id="s0">?</div>
        <div class="slot" id="s1">?</div>
        <div class="slot" id="s2">?</div>
    </div>

    <div class="shelf">
        <div class="tool" draggable="true" id="seed">🌱</div>
        <div class="tool" draggable="true" id="water">💧</div>
        <div class="tool" draggable="true" id="fert">💩</div>
        <div class="tool" draggable="true" id="sun">☀️</div>
    </div>

    <div class="pot-box" id="dropZone">
        <div id="rose"></div>
        <div class="modern-pot"></div>
    </div>

    <div id="envelope">💌</div>
</div>

<script>
    let currentLevel = 1;
    let questStep = 0;
    let quests = [];
    let isMusicPlaying = false; // Kiểm soát nhạc
    const toolsData = { "water":"💧", "fert":"💩", "sun":"☀️", "seed":"🌱" };
    const roseStages = ["", "🌱", "🌿", "🎋", "🌹"];

    const bubble = document.getElementById('bubble');
    const rose = document.getElementById('rose');
    const envelope = document.getElementById('envelope');
    const body = document.getElementById('mainBody');
    const bgMusic = document.getElementById('bgMusic');

    // Hàm bắt đầu phát nhạc khi mẹ tương tác
    function startMusic() {
        if (!isMusicPlaying) {
            bgMusic.volume = 0.6;
            bgMusic.play();
            isMusicPlaying = true;
        }
    }

    function initLevel() {
        questStep = 0;
        quests = (currentLevel === 1) ? ["seed", "seed", "seed"] : 
                 Array.from({length: 3}, (_, i) => {
                    let opts = ["water", "fert", "sun"];
                    return opts[Math.floor(Math.random()*3)];
                 });
        
        for(let i=0; i<3; i++) {
            let s = document.getElementById(`s${i}`);
            s.classList.remove('done');
            s.innerText = toolsData[quests[i]];
        }
        bubble.innerText = (currentLevel === 1) ? "Gieo hạt giống 🌱 mẹ nhé!" : `Cây đang cần ${toolsData[quests[0]]} kìa mẹ!`;
        body.style.background = "linear-gradient(135deg, #fce4ec, #ffc1e3, #ffd6f5)";
    }
    initLevel();

    function spawnSunbeams() {
        for(let i=0; i<6; i++) {
            let b = document.createElement('div');
            b.className = 'sunbeam';
            b.style.left = (i * 20) + 'vw';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 2000);
        }
    }

    function spawnRain() {
        let rainInterval = setInterval(() => {
            let r = document.createElement('div');
            r.className = 'rain-drop';
            r.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 800);
        }, 25);
        setTimeout(() => clearInterval(rainInterval), 2000);
    }

    document.querySelectorAll('.tool').forEach(t => {
        t.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('id', e.target.id);
            startMusic(); // Bật nhạc ngay lần kéo đồ đầu tiên
        });
    });

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => e.preventDefault());
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        const id = e.dataTransfer.getData('id');

        if (id === quests[questStep]) {
            if(id === 'sun') {
                spawnSunbeams();
                body.style.background = "linear-gradient(135deg, #fff9c4, #fff176)";
            }
            if(id === 'water') {
                spawnRain();
                body.style.background = "linear-gradient(135deg, #e1f5fe, #81d4fa)";
            }
            
            document.getElementById(`s${questStep}`).classList.add('done');
            questStep++;
            
            if (questStep >= 3) {
                currentLevel++;
                if (currentLevel <= 4) {
                    rose.innerText = roseStages[currentLevel - 1];
                    rose.style.fontSize = (60 + currentLevel * 15) + "px";
                    setTimeout(initLevel, 1200);
                } else {
                    finishGame();
                }
            } else {
                bubble.innerText = `Chính xác! Tiếp theo là ${toolsData[quests[questStep]]}`;
            }
        } else {
            bubble.innerText = "Sai món rồi mẹ ơi! 🥺";
            setTimeout(() => bubble.innerText = `Cây đang cần ${toolsData[quests[questStep]]} mà!`, 1000);
        }
    });

    function finishGame() {
        rose.innerText = "🌹";
        bubble.innerText = "Chúc mừng mẹ! Hoa hồng đã nở rực rỡ! 🌹💖";
        bgMusic.volume = 1.0; // Tăng âm lượng khi thắng
        setTimeout(() => { envelope.style.display = "block"; }, 1500);
    }

  envelope.onclick = () => {
    // Tạo một đường dẫn giả lập hoặc thực tế đến file của bạn
    const fileName = 'letter.docx'; 
    const a = document.createElement('a');
    a.href = fileName; 
    a.download = fileName; // Lệnh bắt buộc để trình duyệt hiểu là tải về
    
    // Thêm vào body, click rồi xóa ngay để đảm bảo chạy trên mọi trình duyệt
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // Hiển thị thông báo hướng dẫn cho mẹ nếu vẫn không thấy tải
    alert("💌 Lá thư yêu thương đang được gửi đến máy của Mẹ...\n(Nếu không thấy tải về, Mẹ hãy kiểm tra thư mục Download nhé!)");
};
</script>
</body>
</html>
