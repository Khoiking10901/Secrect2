<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>8/3 - Vườn Hồng Tặng Bạn</title>
    <style>
        :root { --pink: #ff80ab; --dark: #c2185b; --glass: rgba(255, 255, 255, 0.8); }

        /* --- UI CHUYÊN BIỆT CHO DI ĐỘNG (XOAY NGANG) --- */
        @media screen and (max-height: 500px) {
            .toolbar { width: 60px !important; gap: 10px !important; }
            .tool { font-size: 30px !important; padding: 5px 0 !important; }
            .status-bubble { padding: 8px !important; font-size: 13px !important; max-width: 400px !important; }
            .pot-container { transform: scale(0.7) translateY(20px); }
            #timer-display { font-size: 12px; padding: 3px 15px; }
        }

        /* --- UI CHO MÁY TÍNH / MÀN HÌNH LỚN --- */
        @media screen and (min-height: 501px) {
            .toolbar { width: 85px; gap: 20px; }
            .tool { font-size: 45px; padding: 10px 0; }
        }

        /* --- PHẦN NỀN & BỐ CỤC CHUNG --- */
        body { 
            margin: 0; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; background: linear-gradient(180deg, #a1c4fd, #fbc2eb); 
            display: flex; transition: filter 0.5s ease;
        }

        /* Overlay nhắc xoay & Fullscreen */
        #orientation-overlay {
            position: fixed; inset: 0; background: var(--dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px;
        }
        @media (orientation: landscape) { #orientation-overlay { display: none; } }

        .toolbar { display: flex; flex-direction: column; justify-content: center; background: var(--glass); backdrop-filter: blur(10px); z-index: 1000; border: 1px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .left-bar { border-radius: 0 30px 30px 0; }
        .right-bar { border-radius: 30px 0 0 30px; }
        
        .tool { cursor: pointer; transition: 0.3s; text-align: center; filter: grayscale(0.6); }
        .tool.selected { filter: grayscale(0); background: white; border-radius: 15px; box-shadow: 0 0 20px var(--pink); transform: scale(1.15); }

        .main-game { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 15px; }

        .pot-container { 
            position: relative; width: 100%; max-width: 300px; height: 300px; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
            cursor: pointer; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .pot { width: 120px; height: 80px; background: white; border: 5px solid #f8bbd0; border-radius: 0 0 50px 50px; z-index: 10; }
        #rose-svg { position: absolute; bottom: 75px; width: 180px; height: 180px; z-index: 5; pointer-events: none; }

        #envelope { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; z-index: 5000; cursor: pointer; animation: bounce 2s infinite; }
        
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -60%) scale(1.1); } }
    </style>
</head>
<body onclick="tryFullscreen()">

<div id="orientation-overlay">
    <div style="font-size: 50px; margin-bottom: 20px;">📱🔄</div>
    <h2>Xoay ngang màn hình</h2>
    <p>Sau đó chạm vào nút dưới đây để bắt đầu!</p>
    <button onclick="tryFullscreen()" style="padding: 15px 30px; border-radius: 25px; border: none; background: white; color: var(--dark); font-weight: bold; cursor: pointer;">VÀO GAME</button>
</div>

<div class="toolbar left-bar">
    <div class="tool" onclick="st('seed', this)">🌱</div>
    <div class="tool" onclick="st('water', this)">💧</div>
    <div class="tool" onclick="st('sun', this)">☀️</div>
</div>

<div class="main-game">
    <div class="status-bubble" id="bubble" style="background: white; padding: 10px 20px; border-radius: 20px; border: 2px solid var(--pink); font-weight: bold; color: var(--dark);">
        Bạn sẵn sàng chưa? Chọn đồ rồi chạm vào chậu nhé!
    </div>
    
    <div id="timer-display" style="background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 15px; font-size: 14px;">⏱️ 0s</div>

    <div class="pot-container" id="potBox" onclick="act()">
        <svg id="rose-svg" viewBox="0 0 100 100">
            <path id="stem" d="M50,95 Q50,70 50,40" style="stroke:#2e7d32; stroke-width:4; fill:none; stroke-dasharray:100; stroke-dashoffset:100; transition:2s;" />
            <circle class="petal" cx="50" cy="40" r="10" style="fill:#ff1744; opacity:0; transition:1s;" />
            <circle class="petal" cx="42" cy="35" r="8" style="fill:#ff1744; opacity:0; transition:1s;" />
            <circle class="petal" cx="58" cy="35" r="8" style="fill:#ff1744; opacity:0; transition:1s;" />
        </svg>
        <div class="pot"></div>
    </div>

    <div style="width: 80%; height: 8px; background: #ddd; border-radius: 4px; overflow: hidden;">
        <div id="pBar" style="width: 0%; height: 100%; background: var(--pink); transition: 0.3s;"></div>
    </div>
</div>

<div class="toolbar right-bar">
    <div class="tool" onclick="st('fert', this)">💩</div>
    <div class="tool" onclick="st('spray', this)">✨</div>
    <div class="tool" onclick="st('heart', this)">💖</div>
</div>

<div id="envelope" onclick="downloadLetter()">💌</div>

<script>
    let lv=1, step=0, target=[], selId=null, startTime=null, timerInterval=null;
    let stats = { fertFail:0, sprayFail:0 };
    const toolIcons = { seed:"🌱", water:"💧", sun:"☀️", fert:"💩", spray:"✨", heart:"💖" };

    function tryFullscreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    function st(id, el) {
        selId = id;
        document.querySelectorAll('.tool').forEach(t => t.classList.remove('selected'));
        el.classList.add('selected');
    }

    function init() {
        step = 0; document.getElementById('pBar').style.width = '0%';
        target = (lv===1) ? Array(5).fill("seed") : ["water","sun","fert","spray","heart"].sort(()=>Math.random()-0.5);
        document.getElementById('bubble').innerHTML = `GĐ ${lv}/4 - Cần cái này: ${toolIcons[target[step]]}`;
    }

    function act() {
        if(!selId) return;
        if(!startTime) { startTime = Date.now(); timerInterval = setInterval(()=> {
            document.getElementById('timer-display').innerText = `⏱️ ${Math.floor((Date.now()-startTime)/1000)}s`;
        }, 1000); init(); }

        if(selId === target[step]) {
            // Sửa lỗi: Cây co lại và ánh sáng bình thường khi chọn đúng
            document.getElementById('potBox').style.transform = "scale(1)";
            document.body.style.filter = "brightness(1)";
            
            step++;
            document.getElementById('pBar').style.width = (step/target.length)*100+'%';
            if(step >= target.length) {
                if(lv===1) document.getElementById('stem').style.strokeDashoffset="0";
                if(lv===4) { 
                    document.querySelectorAll('.petal').forEach(p => p.style.opacity="1");
                    clearInterval(timerInterval);
                    document.getElementById('bubble').innerHTML = "Xong rồi! Quà ở lá thư kìa ❤️";
                    document.getElementById('envelope').style.display = 'block';
                } else { lv++; setTimeout(init, 800); }
            } else { document.getElementById('bubble').innerHTML = `Tiếp tục nào: ${toolIcons[target[step]]}`; }
        } else {
            if(selId==='fert') {
                stats.fertFail++;
                document.getElementById('potBox').style.transform = `scale(${1 + stats.fertFail*0.2})`;
                step = 0; document.getElementById('pBar').style.width = '0%';
                if(stats.fertFail===5) { alert("Cây chiếm thế giới rồi!"); window.open("https://google.com"); }
            }
            if(selId==='spray') {
                stats.sprayFail++;
                document.body.style.filter = `brightness(${1 + stats.sprayFail*0.6})`;
                if(stats.sprayFail===5) { alert("Đi khám mắt thôi bạn ơi!"); window.location.href="https://benhvienmat.vn/"; }
            }
        }
    }

    function downloadLetter() {
        const link = document.createElement('a');
        link.href = 'letter.docx'; link.download = 'letter.docx';
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        alert('Đã tải thư thành công! Kiểm tra máy nhé!');
    }
</script>
</body>
</html>
